[ansible_shed]
# Minutes between ansible-playbook runs
interval=60
# Max minutes random time to wait until doing a run @ startup
start_splay=0

# Port for Prometheus Exporter HTTP server
port=12345
# API token required by /pause, /force-run and /healthz headers:
# X-API-Token: <token>
# Use a random unique string
api_token=change-me-random-token

# Directory to save run output
log_dir=/tmp/ansible_shed/logs

# Local path for ansible repo
repo_path=/tmp/ansible_shed/repo
# Repo Clone URL
repo_url=git@github.com:cooperlees/clc_ansible.git
repo_key=/home/cooper/.ssh/id_rsa

# Ansible Vault password file (optional)
# Path to vault password file to copy to .vault_pass in the checked out repo
# If not set, ansible-playbook will run without vault support
# vault_pass_file=/home/cooper/.ansible_vault_password

# Version check state (optional)
# Parse version_check_state.json from the repo root after each ansible run
# and export package upgrade metrics to prometheus
# version_check_state_enabled=false

# Ansible base CLI args
# ansible_playbook_binary must be in a Python venv: <venv>/bin/ansible-playbook
# ansible_shed uses sibling <venv>/bin/activate to activate that environment
ansible_playbook_binary=/home/cooper/venvs/a/bin/ansible-playbook
# -D / --diff
ansible_show_diff=true
# -i / --inventory
ansible_hosts_inventory=hosts
# main playbook
ansible_playbook_init=site.yaml
# -l / --limit parameters
# ansible_limit=!coopbuntu.cooperlees.com,!random.cooperlees.com
ansible_limit=home2.cooperlees.com
# --skip-tags parameters
ansible_skip_tags=php_static_files,zfs
# --tags
ansible_tags=networkd
