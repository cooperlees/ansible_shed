name: release

on:
  release:
    types: [published]

jobs:
  sdist:
    name: Build sdist + pure-Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist + pure-Python wheel
        run: python -m build

      - name: Upload sdist + pure-Python wheel
        uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: |
            dist/*.tar.gz
            dist/*.whl

  wheels:
    name: Build mypyc wheels (${{ matrix.python }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: cp313
            arch: x86_64
            runner: ubuntu-latest
          - python: cp313
            arch: aarch64
            runner: ubuntu-24.04-arm
          - python: cp314
            arch: x86_64
            runner: ubuntu-latest
          - python: cp314
            arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_BUILD: ${{ matrix.python }}-manylinux_${{ matrix.arch }}
          CIBW_ENVIRONMENT: MYPYC_BUILD=1
          CIBW_BUILD_VERBOSITY: 1

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: dist-wheels-${{ matrix.python }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ansible_shed
    permissions:
      id-token: write
    steps:
      - name: Download all distributions
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: dist-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
